name: happy_bus_crew
description: "Laporan Pertanggungjawaban Crew — Happy Bus. Aplikasi pembuatan laporan pertanggungjawaban crew dalam format PDF."
publish_to: "none"
version: 1.1.0+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # PDF generation & rendering/printing
  pdf: ^3.10.8
  printing: ^5.12.0

  # Local SQLite storage
  sqflite: ^2.3.2
  path: ^1.9.0

  # File system access for exports
  path_provider: ^2.1.3

  # Share PDF to WhatsApp / email / etc.
  share_plus: ^9.0.0

  # Indonesian date & currency formatting
  intl: ^0.19.0

  # OS share / file saving helpers
  fluttertoast: ^8.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
